name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Pinned for reproducibility. v8.x replaced `detect` with the `git`/`dir`
  # subcommands; this workflow uses `gitleaks git`.
  GITLEAKS_VERSION: 8.30.1

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit, not just the tip.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Exits 1 when secrets are found (default), which fails the job and the
      # subsequent failure-gated steps run.
      - name: Scan for secrets
        run: gitleaks git . --redact --no-banner --exit-code 1 --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

      # On fork PRs secrets are not injected, so this step is a no-op failure
      # while the job is already red — see README "CI / Secret scanning".
      - name: Notify Slack on leak detection
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID }}"
            text: ":rotating_light: gitleaks flagged potential secrets on ${{ github.repository }}@${{ github.ref_name }} (run #${{ github.run_number }})"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ":rotating_light: Potential secret leak detected"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository:*\n${{ github.repository }}"
                  - type: mrkdwn
                    text: "*Branch / ref:*\n${{ github.ref_name }}"
                  - type: mrkdwn
                    text: "*Triggered by:*\n${{ github.actor }}"
                  - type: mrkdwn
                    text: "*Event:*\n${{ github.event_name }}"
              - type: section
                text:
                  type: mrkdwn
                  text: "Download the *gitleaks-sarif* artifact from the run for findings. Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View workflow run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
