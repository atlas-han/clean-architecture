# Flyway configuration for this project.
# Connection credentials are injected via environment variables in
# docker-compose.yml (see FLYWAY_URL / FLYWAY_USER / FLYWAY_PASSWORD).
# Keep this file checked in — secrets do NOT live here.

flyway.locations=filesystem:/flyway/sql
flyway.schemas=dbo
flyway.defaultSchema=dbo
flyway.baselineOnMigrate=false
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.placeholderReplacement=false
